---
version: '3'

tasks:
  validate:
    desc: Run all CI validation checks
    cmds:
      - task: :tofu:fmt:check
      - task: :tofu:validate
      - task: :tofu:tflint:all
      - task: :tofu:trivy

  test:
    desc: Run all tests (for CI)
    cmds:
      - task: validate
      - task: :lint:go
      - task: :test:unit
