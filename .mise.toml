# Base tool versions — shared across all environments
# IaC tools pinned to major versions to avoid breaking changes.
# Utility tools use "latest" to keep templates current.
[tools]
opentofu = "1.9"
task = "3"
actionlint = "latest"
yamllint = "latest"
markdownlint-cli2 = "latest"
tflint = "latest"
trivy = "latest"

[env]
GOFLAGS = "-buildvcs=false"
