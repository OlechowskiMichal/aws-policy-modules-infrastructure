pre-commit:
  parallel: true
  commands:
    trailing-whitespace:
      glob: "**/*.{go,tf,yaml,yml,md,json}"
      run: task hooks:trailing-whitespace -- {staged_files}
      fail_text: "trailing whitespace found"

    end-of-file:
      glob: "**/*.{go,tf,yaml,yml,md,json}"
      run: task hooks:end-of-file -- {staged_files}
      fail_text: "files must end with newline"

    check-yaml:
      glob: "**/*.{yaml,yml}"
      run: task hooks:check-yaml -- {staged_files}
      fail_text: "invalid YAML syntax"

    check-large-files:
      run: task hooks:check-large-files -- {staged_files}
      fail_text: "file exceeds 500KB limit"

    check-merge-conflict:
      run: task hooks:check-merge-conflict -- {staged_files}
      fail_text: "merge conflict markers found"
